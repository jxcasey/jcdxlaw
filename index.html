                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.modules) modules = data.modules;
                        if (data.assessments) assessments = data.assessments;
                        if (data.assignments) assignments = data.assignments;
                        if (data.timetable) timetable = data.timetable;
                        if (data.notes) notes = data.notes;
                        saveData('jcd_modules', modules); saveData('jcd_assessments', assessments);
                        saveData('jcd_assignments', assignments); saveData('jcd_timetable', timetable);
                        saveData('jcd_notes', notes);
                        alert('Data imported successfully!'); location.reload();
                    } catch (err) { alert('Import failed: '+err.message); }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();

        // ─── SOCSCILEARN SYNC ──────────────────────────────
        async function syncSocSciLearn() {
            if (!settings.socsciToken) { showModal('Settings', getSettingsForm(), [{label:'Cancel',action:'close-modal'},{label:'Save',action:'save-settings',primary:true}]); return; }
            const base = settings.socsciUrl || 'https://socscilearn.sun.ac.za';
            const proxyBase = IS_LOCAL ? '/api/moodle' : null;
            const call = async (fn, extra='') => {
                const url = proxyBase ? `${proxyBase}?wstoken=${settings.socsciToken}&wsfunction=${fn}&moodlewsrestformat=json${extra}` : `${base}/webservice/rest/server.php?wstoken=${settings.socsciToken}&wsfunction=${fn}&moodlewsrestformat=json${extra}`;
                const r = await fetch(url); if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json();
            };
            try {
                const info = await call('core_webservice_get_site_info');
                if (info.exception) throw new Error(info.message||'Auth failed');
                const uid = info.userid;
                const courses = await call('core_enrol_get_users_courses', `&userid=${uid}`);
                if (!Array.isArray(courses)) throw new Error('Invalid response');
                const freshModules = JSON.parse(JSON.stringify(DEFAULT_MODULES));
                courses.forEach(course => {
                    const known = KNOWN_COURSES[course.id];
                    if (known) { const def = freshModules.find(m=>m.name===known.name); if(def) def.socsciId=course.id; return; }
                    let cleanName = (course.fullname||course.shortname||'').replace(/\d{4}-\d+-\d+/g,'').replace(/\s*\/\s*.*/g,'').replace(/\s+\(.*?\)/g,'').replace(/\s+-\s+\d+$/g,'').split('|')[0].trim();
                    if (!cleanName||/^\d+$/.test(cleanName)||cleanName.length<3) return;
                    if (!freshModules.find(m=>m.name.toLowerCase()===cleanName.toLowerCase()||m.socsciId===course.id)) {
                        freshModules.push({id:`mod-${course.id}`,name:cleanName,code:course.shortname||'',type:'Year Module',color:COLOR_ARRAY[freshModules.length%COLOR_ARRAY.length],socsciId:course.id});
                    }
                });
                modules = freshModules; saveData('jcd_modules', modules);
                const enrolledMods = modules.filter(m=>m.socsciId);
                for (const mod of enrolledMods.slice(0,8)) {
                    try {
                        const assigns = await call('mod_assign_get_assignments', `&courseids[0]=${mod.socsciId}`);
                        if (assigns?.courses) assigns.courses.forEach(course => {
                            course.assignments.forEach(a => {
                                if (!assignments.find(ex=>ex.socsciId===a.id)) {
                                    assignments.push({id:`assign-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,socsciId:a.id,title:a.name,module:mod.name,type:'Assignment',due:a.duedate?new Date(a.duedate*1000).toISOString().split('T')[0]:'',marks:a.grade||100,status:'pending'});
                                }
                            });
                        });
                    } catch(e) {}
                }
                saveData('jcd_assignments', assignments);
                alert(`Synced ${courses.length} courses!`); navigate(currentPage); pushToCloud();
            } catch (err) { alert('Sync failed: '+err.message); console.error(err); }
        }

        // ─── CLOUD SYNC ──────────────────────────────
        async function pushToCloud() {
            if (!IS_LOCAL||!settings.githubGistId||!settings.githubPat) return;
            const payload = {modules,assessments,assignments,timetable,notes,exportedAt:new Date().toISOString()};
            try { await fetch('/api/cloud-push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); } catch(e) { console.warn('Cloud push failed:', e); }
        }
        async function fetchFromCloud() {
            if (IS_LOCAL||!settings.githubGistId) return;
            try {
                const r = await fetch(`https://api.github.com/gists/${settings.githubGistId}`,{headers:{'Accept':'application/vnd.github.v3+json'}});
                if (!r.ok) return; const gist = await r.json();
                const content = gist.files?.['jcdxlaw-data.json']?.content; if (!content) return;
                const data = JSON.parse(content);
                if (data.modules?.length) { modules=data.modules; saveData('jcd_modules',modules); }
                if (data.assessments?.length) { assessments=data.assessments; saveData('jcd_assessments',assessments); }
                if (data.assignments?.length) { assignments=data.assignments; saveData('jcd_assignments',assignments); }
                if (data.timetable?.length) { timetable=data.timetable; saveData('jcd_timetable',timetable); }
                if (data.notes?.length) { notes=data.notes; saveData('jcd_notes',notes); }
                renderPage();
            } catch(e) { console.warn('Cloud fetch failed:', e); }
        }

        // ─── EVENT LISTENERS ──────────────────────────────
        // ─── GLOBAL EVENT DELEGATION (runs once, no accumulation) ────────────────
        function initGlobalListeners() {
            // Single delegated click handler — covers all static + dynamic elements
            document.addEventListener('click', function(e) {
                // Nav items (sidebar — always present)
                const navItem = e.target.closest('.nav-item');
                if (navItem) {
                    const page = navItem.dataset.page;
                    if (page) navigate(page);
                    return;
                }
                // Data-action elements (sidebar + page content)
                const actionEl = e.target.closest('[data-action]');
                if (actionEl) {
                    const action = actionEl.dataset.action;
                    switch(action) {
                        case 'add-assessment':
                            showModal('Add Assessment', getAddAssessmentForm(), [{label:'Cancel',action:'close-modal'},{label:'Save',action:'save-assessment',primary:true}]); break;
                        case 'add-assignment':
                            showModal('Add Assignment', getAddAssignmentForm(), [{label:'Cancel',action:'close-modal'},{label:'Save',action:'save-assignment',primary:true}]); break;
                        case 'add-module':
                            showModal('Add Module', getAddModuleForm(), [{label:'Cancel',action:'close-modal'},{label:'Save',action:'save-module',primary:true}]); break;
                        case 'add-note':
                            showModal('Add Note', getAddNoteForm(), [{label:'Cancel',action:'close-modal'},{label:'Save',action:'save-note',primary:true}]); break;
                        case 'sync':
                            showModal('SocSciLearn Sync', getSettingsForm(), [{label:'Close',action:'close-modal'},{label:'Save Settings',action:'save-settings',primary:true},{label:'Sync Now',action:'sync-now',primary:true}]); break;
                        case 'view-module': navigate('module-detail', actionEl.dataset.moduleId); break;
                        case 'back-to-modules': navigate('modules'); break;
                        case 'delete-assignment': if(confirm('Delete this assignment?')) deleteAssignment(actionEl.dataset.assignmentId); break;
                        case 'export': exportData(); break;
                        case 'import': importData(); break;
                        case 'theme': {
                            document.body.classList.toggle('light-mode');
                            const isLight = document.body.classList.contains('light-mode');
                            localStorage.setItem('theme', isLight ? 'light' : 'dark');
                            document.querySelectorAll('[data-action="theme"]').forEach(el => {
                                el.textContent = isLight ? '☼' : '☽';
                            });
                            break;
                        }
                    }
                    return;
                }
                // Filter pills (page content — recreated on each render, delegation safe)
                const pill = e.target.closest('.filter-pill');
                if (pill) {
                    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    renderPage();
                    return;
                }
                // Color option picker
                const colorOpt = e.target.closest('.color-option');
                if (colorOpt) {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    colorOpt.classList.add('selected');
                    return;
                }
                // Reference output tab buttons
                const refTabBtn = e.target.closest('.reference-tab-button');
                if (refTabBtn) {
                    const tab = refTabBtn.dataset.tab;
                    const card = refTabBtn.closest('.reference-output');
                    card.querySelectorAll('.reference-tab-button').forEach(b => b.classList.remove('active'));
                    card.querySelectorAll('.reference-tab-content').forEach(c => c.classList.remove('active'));
                    refTabBtn.classList.add('active');
                    card.querySelector(`.reference-tab-content[data-tab="${tab}"]`)?.classList.add('active');
                    return;
                }
                // Citation type selector
                const refTypeBtn = e.target.closest('.ref-type-btn');
                if (refTypeBtn) {
                    document.querySelectorAll('.ref-type-btn').forEach(b => b.classList.remove('active'));
                    refTypeBtn.classList.add('active');
                    showRefForm(refTypeBtn.dataset.refType);
                    return;
                }
                // Topic expand/collapse (module detail page)
                const topicItem = e.target.closest('.topic-item');
                if (topicItem) {
                    const sub = topicItem.querySelector('.subtopics');
                    if (sub) sub.classList.toggle('open');
                    return;
                }
                // File viewer close
                if (e.target.closest('#file-viewer-close')) {
                    closeFileViewer();
                    return;
                }
                // Delete file from materials panel
                const delBtn = e.target.closest('[data-action="delete-file"]');
                if (delBtn) {
                    e.stopPropagation();
                    if (confirm('Remove this file from the app?')) {
                        const id = delBtn.dataset.fileId;
                        dbDeleteFile(id).then(() => {
                            delBtn.closest('.material-card')?.remove();
                        });
                    }
                    return;
                }
                // Open file in viewer
                const fileCard = e.target.closest('[data-action="open-file"]');
                if (fileCard && !e.target.closest('[data-action="delete-file"]')) {
                    dbGetFile(fileCard.dataset.fileId).then(rec => { if (rec) openFileViewer(rec); });
                    return;
                }
            });
            // Single delegated change handler
            document.addEventListener('change', function(e) {
                // File upload input
                const fileInput = e.target.closest('input[type="file"][data-module-id]');
                if (fileInput && fileInput.files.length > 0) {
                    const moduleId = fileInput.dataset.moduleId;
                    const files = Array.from(fileInput.files);
                    const container = document.getElementById('mat-' + moduleId);
                    if (container) container.innerHTML = '<div style="color:var(--text-tertiary);font-size:13px;">Saving ' + files.length + ' file' + (files.length > 1 ? 's' : '') + '…</div>';
                    Promise.all(files.map(f => dbSaveFile(moduleId, f)))
                        .then(() => dbGetModuleFiles(moduleId))
                        .then(allFiles => {
                            if (container) container.innerHTML = renderMaterialsContent(moduleId, allFiles);
                        })
                        .catch(err => {
                            alert('Error saving files: ' + err.message);
                            if (container) container.innerHTML = renderMaterialsContent(moduleId, []);
                        });
                    return;
                }
                // Assignment status dropdown
                const statusSel = e.target.closest('.status-select');
                if (statusSel) {
                    updateAssignmentStatus(statusSel.dataset.assignmentId, statusSel.value);
                    const statusColors = { Pending: '#f59e0b', Submitted: '#10b981', Graded: '#3b82f6' };
                    const col = statusColors[statusSel.value] || '#8888a0';
                    statusSel.style.background = `${col}18`;
                    statusSel.style.borderColor = `${col}40`;
                    statusSel.style.color = col;
                    return;
                }
                // Module filter select
                const modFilter = e.target.closest('[data-module-filter]');
                if (modFilter) { renderPage(); return; }
            });
        }
        // Legacy no-op — kept so any accidental call doesn't throw
        function attachEventListeners() {}

        // ─── INIT ──────────────────────────────
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            document.querySelector('[data-action="theme"]').textContent = '☼';
        }
        initGlobalListeners();   // attach once — event delegation, no accumulation

        // ── Mobile sidebar toggle ──────────────────────────────────────────
        const mobileSidebar = document.querySelector('.sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const mobileMenuBtn  = document.getElementById('mobile-menu-btn');

        function openMobileSidebar() {
            mobileSidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
            mobileSidebar.style.display = 'flex';
        }
        function closeMobileSidebar() {
            mobileSidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
            // Re-hide after transition on mobile
            setTimeout(() => {
                if (!mobileSidebar.classList.contains('open') && window.innerWidth <= 768) {
                    mobileSidebar.style.display = 'none';
                }
            }, 320);
        }
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                if (mobileSidebar.classList.contains('open')) closeMobileSidebar();
                else openMobileSidebar();
            });
        }
        if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeMobileSidebar);

        // Close sidebar when a nav item is tapped on mobile
        document.querySelectorAll('.sidebar .nav-item').forEach(item => {
            item.addEventListener('click', () => { if (window.innerWidth <= 768) closeMobileSidebar(); });
        });

        // ── Sync mobile theme btn icon ─────────────────────────────────────
        function syncMobileThemeIcon() {
            const btn = document.getElementById('mobile-theme-btn');
            if (btn) btn.textContent = document.body.classList.contains('light-mode') ? '☼' : '☽';
        }
        syncMobileThemeIcon();

        // Patch theme toggle to also update mobile icon
        const _origTheme = document.querySelector('[data-action="theme"]');

        // ── Sync bottom nav active state ──────────────────────────────────
        function syncMobileNav(pageId) {
            const navPage = pageId === 'module-detail' ? 'modules' : pageId;
            document.querySelectorAll('.mobile-nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.page === navPage);
            });
        }

        // ── Patch navigate() to also sync mobile nav ──────────────────────
        const _origNavigate = navigate;
        window.navigateWithMobile = function(pageId, extraData) {
            _origNavigate(pageId, extraData);
            syncMobileNav(pageId);
            syncMobileThemeIcon();
        };

        // Wire bottom nav taps
        document.querySelectorAll('.mobile-nav-item[data-page]').forEach(item => {
            item.addEventListener('click', function() {
                window.navigateWithMobile(this.dataset.page);
            });
        });

        // Initial mobile nav state
        syncMobileNav('dashboard');

        renderPage();
        if (!IS_LOCAL) fetchFromCloud();
        if (IS_LOCAL) syncCalendar(true);
        if (IS_LOCAL) setInterval(() => syncCalendar(true), 5*60*1000);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW registration failed:',e));
        }
    </script>

    <!-- ─── FILE VIEWER OVERLAY ─── -->
    <div class="file-viewer-overlay" id="file-viewer">
        <div class="file-viewer-bar">
            <div class="mobile-icon-btn" id="file-viewer-close" style="cursor:pointer;flex-shrink:0;">✕</div>
            <div class="file-viewer-title" id="file-viewer-title">Document</div>
            <button class="btn btn-secondary btn-small" id="file-viewer-download">↓ Save</button>
        </div>
        <div class="file-viewer-body" id="file-viewer-body">
            <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);">Loading…</div>
        </div>
    </div>
</body>
</html>
