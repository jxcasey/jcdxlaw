<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JCDxLAW - Law Study Dashboard for Stellenbosch University">
    <title>JCDxLAW - Law Study Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%237c5cfc' width='100' height='100'/><text x='50' y='65' font-size='60' font-weight='bold' fill='white' text-anchor='middle' font-family='system-ui'>⚖</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c5cfc;
            --primary-dark: #6d4ae8;
            --bg-dark: #0a0a12;
            --surface: rgba(255, 255, 255, 0.08);
            --surface-hover: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --accent-1: #6366f1;
            --accent-2: #3b82f6;
            --accent-3: #10b981;
            --accent-4: #f59e0b;
            --accent-5: #ef4444;
            --accent-6: #14b8a6;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, -webkit-system-font, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f0f1a 100%);
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(10, 10, 18, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px 16px;
            gap: 32px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .page-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 18, 0.2);
            backdrop-filter: blur(10px);
        }

        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            padding: 0 12px;
            margin-bottom: 8px;
        }

        .nav-item {
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            color: var(--text-secondary);
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .sidebar-spacer {
            flex: 1;
        }

        .sidebar-bottom {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: var(--surface-hover);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: var(--surface);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stat-card .label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .module-card {
            background: var(--surface);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .module-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-color, var(--primary));
        }

        .module-card:hover {
            background: var(--surface-hover);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(124, 92, 252, 0.15);
        }

        .module-card .header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .module-card .name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .module-card .code {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .module-card .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(124, 92, 252, 0.2);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .module-card .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .module-card .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid transparent;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 10px 30px rgba(124, 92, 252, 0.3);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface-hover);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border-color: transparent;
        }

        .btn-ghost:hover {
            color: var(--text-primary);
            background: var(--surface);
            border-color: var(--border);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--surface-hover);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .color-picker-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: white;
            box-shadow: 0 0 0 2px var(--bg-dark), 0 0 20px rgba(124, 92, 252, 0.4);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .modal-actions .btn {
            flex: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        table thead {
            border-bottom: 1px solid var(--border);
        }

        table thead th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table tbody td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: fit-content;
        }

        .status-badge.upcoming {
            background: rgba(248, 113, 113, 0.2);
            color: #fecaca;
        }

        .status-badge.pending {
            background: rgba(251, 146, 60, 0.2);
            color: #fed7aa;
        }

        .status-badge.submitted {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .status-badge.graded {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .status-badge.completed {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .tab-button {
            padding: 12px 0;
            border-bottom: 2px solid transparent;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .tab-button:hover {
            color: var(--text-primary);
        }

        .tab-button.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 8px 14px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .filter-pill:hover {
            background: var(--surface-hover);
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .filter-pill.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .content-with-sidebar {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 24px;
            margin-top: 24px;
        }

        .sidebar-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .sidebar-item {
            background: var(--surface);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .sidebar-item.upcoming {
            border-left: 3px solid var(--primary);
        }

        .sidebar-item-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .sidebar-item-detail {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .timetable-grid {
            display: grid;
            grid-template-columns: 80px repeat(5, 1fr);
            gap: 12px;
            margin-top: 24px;
        }

        .time-slot {
            background: var(--surface);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            min-height: 60px;
        }

        .time-slot.header {
            background: rgba(124, 92, 252, 0.1);
            color: var(--primary);
            font-weight: 600;
        }

        .time-slot.has-class {
            background: var(--surface-hover);
            border-color: var(--accent-color, var(--primary));
        }

        .class-in-slot {
            font-size: 11px;
            font-weight: 600;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            background: var(--accent-color, var(--primary));
            text-align: center;
        }

        .note-card {
            background: var(--surface);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .note-card:hover {
            background: var(--surface-hover);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
        }

        .note-card .module-tag {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .note-card .title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .note-card .preview {
            font-size: 13px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .reference-type-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .reference-output {
            background: var(--surface);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-top: 24px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .reference-output.output-tabs {
            padding: 0;
            overflow: hidden;
        }

        .reference-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .reference-tab-button {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .reference-tab-button.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .reference-tab-content {
            padding: 20px;
            display: none;
        }

        .reference-tab-content.active {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-content {
            animation: slideIn 0.3s ease;
        }

        @media (max-width: 1400px) {
            .grid-3 {
                grid-template-columns: repeat(2, 1fr);
            }
            .content-with-sidebar {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1024px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .grid-3 {
                grid-template-columns: 1fr;
            }
            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }
            .timetable-grid {
                grid-template-columns: 60px repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                position: absolute;
                height: 100vh;
                z-index: 100;
                left: -280px;
                transition: left 0.3s ease;
            }
            .sidebar.open {
                left: 0;
            }
            .main-content {
                width: 100%;
            }
            .page-header {
                padding: 16px 20px;
            }
            .page-content {
                padding: 20px;
            }
            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }
            .timetable-grid {
                grid-template-columns: 50px repeat(2, 1fr);
            }
        }

        .theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--surface-hover);
            border-color: rgba(255, 255, 255, 0.15);
        }

        body.light-mode {
            --bg-dark: #f8f8fb;
            --surface: rgba(0, 0, 0, 0.05);
            --surface-hover: rgba(0, 0, 0, 0.08);
            --border: rgba(0, 0, 0, 0.1);
            --text-primary: #1a1a2e;
            --text-secondary: #666680;
        }

        body.light-mode .sidebar {
            background: rgba(248, 248, 251, 0.4);
            border-right-color: var(--border);
        }
    </style>
</head>
<body class="dark-mode">
    <div class="app-container">
        <div class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">⚖</div>
                <div class="logo-text">JCDxLAW</div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Navigation</div>
                <div class="nav-item active" data-page="dashboard">📊 Dashboard</div>
                <div class="nav-item" data-page="modules">📚 Modules</div>
                <div class="nav-item" data-page="assessments">📝 Assessments</div>
                <div class="nav-item" data-page="assignments">✍️ Assignments</div>
                <div class="nav-item" data-page="timetable">🕐 Timetable</div>
                <div class="nav-item" data-page="notes">📖 Notes</div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-label">Tools</div>
                <div class="nav-item" data-page="referencing">🔗 Referencing</div>

        const DEFAULT_TIMETABLE = [

            { id: 'class-2', module: 'Foundations of Law', day: 'Monday', time: '14:00', duration: '1h', venue: 'OMB 1031', type: 'Tutorial' },

            { id: 'class-5', module: 'Legal Ethics', day: 'Wednesday', time: '08:00', duration: '1h', venue: '', type: 'Tutorial' },

            { id: 'class-9', module: 'Constitutional Law', day: 'Wednesday', time: '16:00', duration: '1h', venue: 'Krotoa 1001', type: 'Lecture' },
            { id: 'class-10', module: 'Foundations of Law', day: 'Thursday', time: '08:00', duration: '1h', venue: 'VDS 1024', type: 'Lecture' },
            { id: 'class-11', module: 'Intro to Constitutional Law', day: 'Thursday', time: '09:00', duration: '1h', venue: 'Krotoa 1001', type: 'Lecture' },
            { id: 'class-12', module: 'Property Law', day: 'Thursday', time: '14:00', duration: '1h', venue: 'VDS 3124', type: 'Lecture' },
            { id: 'class-13', module: 'Constitutional Law', day: 'Thursday', time: '15:00', duration: '1h', venue: 'Krotoa 1001', type: 'Lecture' },
            { id: 'class-14', module: 'Intro to Constitutional Law', day: 'Friday', time: '08:00', duration: '1h', venue: 'BA 230', type: 'Lecture' },

        ];

        const APP_VERSION = '2.1';
        let currentPage = 'dashboard';

        function loadData(key, defaultValue) {
            const stored = localStorage.getItem(key);
            return stored ? JSON.parse(stored) : defaultValue;
        }

        function saveData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        // Force reset modules & timetable when version changes (clears duplicates + corrupted data)
        if (localStorage.getItem('jcd_version') !== APP_VERSION) {
            localStorage.removeItem('jcd_modules');
            localStorage.removeItem('jcd_timetable');
            localStorage.setItem('jcd_version', APP_VERSION);
        }

        let modules = loadData('jcd_modules', DEFAULT_MODULES);
        let assessments = loadData('jcd_assessments', []);
        let assignments = loadData('jcd_assignments', []);
        let timetable = loadData('jcd_timetable', DEFAULT_TIMETABLE);
        let notes = loadData('jcd_notes', []);
        let settings = loadData('jcd_settings', { socsciUrl: '', socsciToken: '', githubGistId: '', githubPat: '' });

        function navigate(pageId) {
            currentPage = pageId;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-page="${pageId}"]`).classList.add('active');
            renderPage();
        }

        function renderPage() {
            const header = document.getElementById('page-header');
            const content = document.getElementById('page-content');

            switch (currentPage) {
                case 'dashboard':
                    header.innerHTML = '';
                    content.innerHTML = renderDashboard();
                    break;
                case 'modules':
                    header.innerHTML = '<h2 style="font-size: 28px; font-weight: 700;">Modules</h2>';
                    content.innerHTML = renderModulesPage();
                    break;
                case 'assessments':
                    header.innerHTML = '<div style="display: flex; justify-content: space-between; align-items: center;"><h2 style="font-size: 28px; font-weight: 700;">Assessments</h2><button class="btn btn-primary" data-action="add-assessment">+ Add Assessment</button></div>';
                    content.innerHTML = renderAssessmentsPage();
                    break;
                case 'assignments':
                    header.innerHTML = '<div style="display: flex; justify-content: space-between; align-items: center;"><h2 style="font-size: 28px; font-weight: 700;">Assignments</h2><button class="btn btn-primary" data-action="add-assignment">+ Add Assignment</button></div>';
                    content.innerHTML = renderAssignmentsPage();
                    break;
                case 'timetable':
                    header.innerHTML = '<h2 style="font-size: 28px; font-weight: 700;">Timetable</h2>';
                    content.innerHTML = renderTimetablePage();
                    break;
                case 'notes':
                    header.innerHTML = '<div style="display: flex; justify-content: space-between; align-items: center;"><h2 style="font-size: 28px; font-weight: 700;">Notes</h2><button class="btn btn-primary" data-action="add-note">+ Add Note</button></div>';
                    content.innerHTML = renderNotesPage();
                    break;
                case 'referencing':
                    header.innerHTML = '<h2 style="font-size: 28px; font-weight: 700;">Citation Generator</h2>';
                    content.innerHTML = renderReferencingPage();
                    break;
            }

            attachEventListeners();
        }

        function getModuleColor(moduleName) {
            const mod = modules.find(m => m.name === moduleName);
            return mod ? mod.color : '#7c5cfc';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-ZA', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        }

        function getDaysUntil(dateStr) {
            if (!dateStr) return null;
            const d = new Date(dateStr);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            d.setHours(0, 0, 0, 0);
            const diff = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
            return diff;
        }

        function renderDashboard() {
            const today = new Date().toLocaleDateString('en-ZA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const activeAssessments = assessments.filter(a => getDaysUntil(a.date) > 0).length;
            const pendingAssignments = assignments.filter(a => a.status !== 'Graded').length;
            const todayClasses = timetable.filter(c => {
                const dayMap = { 0: 'Sunday', 1: 'Monday', 2: 'Tuesday', 3: 'Wednesday', 4: 'Thursday', 5: 'Friday', 6: 'Saturday' };
                return c.day === dayMap[new Date().getDay()];
            });

            const upcomingDeadlines = [
                ...assessments.filter(a => getDaysUntil(a.date) > 0).sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 3),
                ...assignments.filter(a => a.status !== 'Graded' && a.dueDate).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).slice(0, 3)
            ].sort((a, b) => {
                const dateA = new Date(a.date || a.dueDate);
                const dateB = new Date(b.date || b.dueDate);
                return dateA - dateB;
            }).slice(0, 5);

            return `
                <div style="display: flex; flex-direction: column; gap: 32px;">
                    <div>
                        <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 8px;">Welcome back, Josh</h1>
                        <p style="color: var(--text-secondary); font-size: 15px;">${today}</p>
                    </div>

                    <div class="grid-4">
                        <div class="stat-card">
                            <div class="label">Active Modules</div>
                            <div class="value">${modules.length}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Upcoming Assessments</div>
                            <div class="value">${activeAssessments}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Pending Tasks</div>
                            <div class="value">${pendingAssignments}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Today's Classes</div>
                            <div class="value">${todayClasses.length}</div>
                        </div>
                    </div>

                    <div>
                        <h3 style="font-size: 20px; font-weight: 700; margin-bottom: 16px;">Your Modules</h3>
                        <div class="grid-3">
                            ${modules.map(mod => `
                                <div class="module-card" style="--accent-color: ${mod.color};" data-action="view-module" data-module-id="${mod.id}">
                                    <div class="header">
                                        <div>
                                            <div class="name">${mod.name}</div>
                                            <div class="code">${mod.code}</div>
                                        </div>
                                        <div class="badge">${mod.type}</div>
                                    </div>
                                    <div class="stats">
                                        <div class="stat-item">📝 ${assignments.filter(a => a.module === mod.name).length}</div>
                                        <div class="stat-item">📖 ${notes.filter(n => n.module === mod.name).length}</div>
                                    </div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${Math.min(notes.filter(n => n.module === mod.name).length * 20, 100)}%;"></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="content-with-sidebar">
                        <div></div>
                        <div class="sidebar-panel">
                            <div>
                                <div class="sidebar-section-title">Upcoming Deadlines</div>
                                ${upcomingDeadlines.length > 0 ? upcomingDeadlines.map(item => `
                                    <div class="sidebar-item upcoming">
                                        <div class="sidebar-item-title">${item.title || item.name}</div>
                                        <div class="sidebar-item-detail">${item.module}</div>
                                        <div class="sidebar-item-detail">${formatDate(item.date || item.dueDate)}</div>
                                    </div>
                                `).join('') : '<div class="sidebar-item">No upcoming deadlines</div>'}
                            </div>

                            <div>
                                <div class="sidebar-section-title">Today's Schedule</div>
                                ${todayClasses.length > 0 ? todayClasses.map(cls => `
                                    <div class="sidebar-item">
                                        <div class="sidebar-item-title">${cls.module}</div>
                                        <div class="sidebar-item-detail">${cls.time} • ${cls.type}</div>
                                        <div class="sidebar-item-detail">${cls.venue || 'TBD'}</div>
                                    </div>
                                `).join('') : '<div class="sidebar-item">No classes today</div>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderModulesPage() {
            return `
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <button class="btn btn-primary" data-action="add-module">+ Add Module</button>
                    <div class="grid-3">
                        ${modules.map(mod => `
                            <div class="module-card" style="--accent-color: ${mod.color};" data-action="view-module" data-module-id="${mod.id}">
                                <div class="header">
                                    <div>
                                        <div class="name">${mod.name}</div>
                                        <div class="code">${mod.code}</div>
                                    </div>
                                    <div class="badge">${mod.type}</div>
                                </div>
                                <div class="stats">
                                    <div class="stat-item">📝 ${assignments.filter(a => a.module === mod.name).length}</div>
                                    <div class="stat-item">📖 ${notes.filter(n => n.module === mod.name).length}</div>
                                    <div class="stat-item">📋 ${assessments.filter(a => a.module === mod.name).length}</div>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${Math.min((assignments.filter(a => a.module === mod.name).length + notes.filter(n => n.module === mod.name).length) * 10, 100)}%;"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderAssessmentsPage() {
            const filters = ['All', 'Upcoming', 'Completed'];
            const activeFilter = document.querySelector('.filter-pill.active')?.textContent || 'All';

            let filtered = assessments;
            if (activeFilter === 'Upcoming') {
                filtered = assessments.filter(a => getDaysUntil(a.date) > 0);
            } else if (activeFilter === 'Completed') {
                filtered = assessments.filter(a => getDaysUntil(a.date) <= 0);
            }

            return `
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <div class="filter-group">
                        ${filters.map(f => `
                            <div class="filter-pill ${f === activeFilter ? 'active' : ''}" data-filter="${f}">${f}</div>
                        `).join('')}
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Assessment Name</th>
                                <th>Module</th>
                                <th>Type</th>
                                <th>Date</th>
                                <th>Venue</th>
                                <th>Weight</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filtered.length > 0 ? filtered.map(a => `
                                <tr>
                                    <td>${a.name}</td>
                                    <td>${a.module}</td>
                                    <td>${a.type}</td>
                                    <td>${formatDate(a.date)}</td>
                                    <td>${a.venue || '-'}</td>
                                    <td>${a.weight || '-'}</td>
                                    <td><span class="status-badge ${getDaysUntil(a.date) > 0 ? 'upcoming' : 'completed'}">${getDaysUntil(a.date) > 0 ? 'Upcoming' : 'Completed'}</span></td>
                                </tr>
                            `).join('') : '<tr><td colspan="7" style="text-align: center; padding: 32px;">No assessments</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderAssignmentsPage() {
            const filters = ['All', 'Pending', 'Submitted', 'Graded'];
            const activeFilter = document.querySelector('.filter-pill.active')?.textContent || 'All';

            let filtered = assignments;
            if (activeFilter === 'Pending') {
                filtered = assignments.filter(a => a.status === 'Pending');
            } else if (activeFilter === 'Submitted') {
                filtered = assignments.filter(a => a.status === 'Submitted');
            } else if (activeFilter === 'Graded') {
                filtered = assignments.filter(a => a.status === 'Graded');
            }

            return `
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <div class="filter-group">
                        ${filters.map(f => `
                            <div class="filter-pill ${f === activeFilter ? 'active' : ''}" data-filter="${f}">${f}</div>
                        `).join('')}
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Module</th>
                                <th>Type</th>
                                <th>Due Date</th>
                                <th>Status</th>
                                <th>Marks</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filtered.length > 0 ? filtered.map(a => `
                                <tr>
                                    <td>${a.title}</td>
                                    <td>${a.module}</td>
                                    <td>${a.type}</td>
                                    <td>${formatDate(a.dueDate)}</td>
                                    <td><span class="status-badge ${a.status.toLowerCase()}">${a.status}</span></td>
                                    <td>${a.marks || '-'}</td>
                                </tr>
                            `).join('') : '<tr><td colspan="6" style="text-align: center; padding: 32px;">No assignments</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderTimetablePage() {
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            const hours = Array.from({length: 11}, (_, i) => `${String(7 + i).padStart(2, '0')}:00`);

            return `
                <div style="overflow-x: auto;">
                    <div class="timetable-grid">
                        <div class="time-slot header"></div>
                        ${days.map(day => `<div class="time-slot header">${day}</div>`).join('')}

                        ${hours.map(hour => `
                            <div class="time-slot header">${hour}</div>
                            ${days.map(day => {
                                const cls = timetable.find(c => c.day === day && c.time === hour);
                                return `
                                    <div class="time-slot ${cls ? 'has-class' : ''}" style="${cls ? `--accent-color: ${getModuleColor(cls.module)}` : ''}">
                                        ${cls ? `<div class="class-in-slot">${cls.module}</div><div style="font-size: 10px; margin-top: 4px;">${cls.type}</div>` : ''}
                                    </div>
                                `;
                            }).join('')}
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderNotesPage() {
            const moduleFilter = document.querySelector('[data-module-filter]')?.value || 'All';
            let filtered = notes;
            if (moduleFilter !== 'All') {
                filtered = notes.filter(n => n.module === moduleFilter);
            }

            return `
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <select data-module-filter style="max-width: 200px;" class="form-group" style="margin-bottom: 0;">
                        <option value="All">All Modules</option>
                        ${modules.map(m => `<option value="${m.name}">${m.name}</option>`).join('')}
                    </select>

                    <div class="grid-3">
                        ${filtered.length > 0 ? filtered.map(n => `
                            <div class="note-card">
                                <div class="module-tag">${n.module}</div>
                                <div class="title">${n.title}</div>
                                <div class="preview">${n.content.substring(0, 100)}</div>
                            </div>
                        `).join('') : '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">No notes yet</div>'}
                    </div>
                </div>
            `;
        }

        function renderReferencingPage() {
            return `
                <div style="max-width: 800px;">
                    <div class="reference-type-buttons">
                        <button class="btn btn-secondary" data-ref-type="case">Case</button>
                        <button class="btn btn-secondary" data-ref-type="legislation">Legislation</button>
                        <button class="btn btn-secondary" data-ref-type="book">Book</button>
                        <button class="btn btn-secondary" data-ref-type="journal">Journal</button>
                        <button class="btn btn-secondary" data-ref-type="chapter">Chapter</button>
                        <button class="btn btn-secondary" data-ref-type="internet">Internet</button>
                    </div>

                    <div id="ref-form" style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px;">
                    </div>

                    <div class="reference-output output-tabs">
                        <div class="reference-tabs">
                            <button class="reference-tab-button active" data-tab="footnote">Footnote</button>
                            <button class="reference-tab-button" data-tab="subsequent">Subsequent</button>
                            <button class="reference-tab-button" data-tab="bibliography">Bibliography</button>
                        </div>
                        <div class="reference-tab-content active" data-tab="footnote" id="footnote-output">Select a reference type and fill in the details</div>
                        <div class="reference-tab-content" data-tab="subsequent" id="subsequent-output"></div>
                        <div class="reference-tab-content" data-tab="bibliography" id="bibliography-output"></div>
                    </div>

                    <div style="margin-top: 32px; padding: 20px; background: var(--surface); border-radius: 16px; border: 1px solid var(--border);">
                        <h3 style="font-weight: 700; margin-bottom: 16px;">OSCOLA Quick Reference</h3>
                        <div style="font-size: 13px; color: var(--text-secondary); line-height: 1.8;">
                            <p><strong>Case:</strong> Surname [year] (series) startpage, pinpoint</p>
                            <p><strong>Legislation:</strong> Short title (year)</p>
                            <p><strong>Book:</strong> Surname, Title (edition, year) startpage</p>
                            <p><strong>Journal:</strong> Surname, 'Title' (year) volume(issue) startpage</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function showModal(title, content, actions) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');

            let html = `
                <button class="modal-close" data-action="close-modal">✕</button>
                <h2 class="modal-title">${title}</h2>
                ${content}
            `;

            if (actions) {
                html += `
                    <div class="modal-actions">
                        ${actions.map(a => `<button class="btn ${a.primary ? 'btn-primary' : 'btn-secondary'}" data-action="${a.action}">${a.label}</button>`).join('')}
                    </div>
                `;
            }

            modalContent.innerHTML = html;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

            return `

                    <input type="text" id="assessment-name" placeholder="e.g., Constitutional Law Test 1">

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="assessment-date">

                    <label>Venue</label>
                    <input type="text" id="assessment-venue" placeholder="e.g., VDS 1024">
                </div>

                    <input type="number" id="assessment-weight" placeholder="e.g., 30">
                </div>

                socsciToken: document.getElementById('settings-socsci-token')?.value || settings.socsciToken || '',

            };
            saveData('jcd_settings', settings);

                fetch('/api/cloud-config', {
                    method: 'POST',

        function exportData() {
            const data = { modules, assessments, assignments, timetable, notes };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `jcdxlaw-export-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.modules) modules = data.modules;
                        if (data.assessments) assessments = data.assessments;
                        if (data.assignments) assignments = data.assignments;
                        if (data.timetable) timetable = data.timetable;
                        if (data.notes) notes = data.notes;

                        saveData('jcd_modules', modules);
                        saveData('jcd_assessments', assessments);
                        saveData('jcd_assignments', assignments);
                        saveData('jcd_timetable', timetable);
                        saveData('jcd_notes', notes);

                        alert('Data imported successfully!');
                        location.reload();
                    } catch (err) {
                        alert('Failed to import data: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        async function syncSocSciLearn() {
            if (!settings.socsciToken) {
                showModal('Settings', getSettingsForm(), [
                    { label: 'Cancel', action: 'close-modal' },
                    { label: 'Save', action: 'save-settings', primary: true },
                ]);
                return;
            }

            const base = settings.socsciUrl || 'https://socscilearn.sun.ac.za';
            const proxyBase = IS_LOCAL ? '/api/moodle' : null;

            const call = async (fn, extra = '') => {
                const url = proxyBase
                    ? `${proxyBase}?wstoken=${settings.socsciToken}&wsfunction=${fn}&moodlewsrestformat=json${extra}`
                    : `${base}/webservice/rest/server.php?wstoken=${settings.socsciToken}&wsfunction=${fn}&moodlewsrestformat=json${extra}`;
                const r = await fetch(url);
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            };

            try {
                // 1. Get user info
                const info = await call('core_webservice_get_site_info');
                if (info.exception) throw new Error(info.message || 'Auth failed');
                const uid = info.userid;

                // 2. Get enrolled courses
                const courses = await call('core_enrol_get_users_courses', `&userid=${uid}`);
                if (!Array.isArray(courses)) throw new Error('Invalid response');

                // Start from clean defaults each sync — avoids accumulating duplicates
                const freshModules = JSON.parse(JSON.stringify(DEFAULT_MODULES));

                courses.forEach((course, i) => {
                    // Skip if this course id is already mapped to a default module
                    const knownCourse = KNOWN_COURSES[course.id];
                    if (knownCourse) {
                        // Just ensure the default module has its socsciId set
                        const def = freshModules.find(m => m.name === knownCourse.name);
                        if (def) def.socsciId = course.id;
                        return; // don't add a new entry
                    }

                    // Clean ugly Moodle names like "2026-51829-244"
                    let cleanName = (course.fullname || course.shortname || '')
                        .replace(/\d{4}-\d+-\d+/g, '')
                        .replace(/\s*\/\s*.*/g, '')   // strip Afrikaans after slash
                        .replace(/\s+\(.*?\)/g, '')
                        .replace(/\s+-\s+\d+$/g, '')  // strip trailing code
                        .split('|')[0]
                        .trim();

                    if (!cleanName || /^\d+$/.test(cleanName) || cleanName.length < 3) return;

                    // Don't add if already in freshModules (by name or socsciId)
                    const alreadyHas = freshModules.find(m =>
                        m.name.toLowerCase() === cleanName.toLowerCase() || m.socsciId === course.id
                    );
                    if (!alreadyHas) {
                        freshModules.push({
                            id: `mod-${course.id}`,
                            name: cleanName,
                            code: course.shortname || '',
                            type: 'Year Module',
                            color: COLOR_ARRAY[freshModules.length % COLOR_ARRAY.length],
                            socsciId: course.id,
                        });
                    }
                });

                modules = freshModules;
                saveData('jcd_modules', modules);

                // 3. Fetch assignments for known modules
                const enrolledMods = modules.filter(m => m.socsciId);
                for (const mod of enrolledMods.slice(0, 8)) {
                    try {
                        const assigns = await call('mod_assign_get_assignments', `&courseids[0]=${mod.socsciId}`);
                        if (assigns && assigns.courses) {
                            assigns.courses.forEach(course => {
                                course.assignments.forEach(a => {
                                    if (!assignments.find(ex => ex.socsciId === a.id)) {
                                        assignments.push({
                                            id: `assign-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
                                            socsciId: a.id,
                                            title: a.name,
                                            module: mod.name,
                                            type: 'Assignment',
                                            due: a.duedate ? new Date(a.duedate * 1000).toISOString().split('T')[0] : '',
                                            marks: a.grade || 100,
                                            status: 'pending',
                                        });
                                    }
                                });
                            });
                        }
                    } catch (e) { /* skip failed course */ }
                }
                saveData('jcd_assignments', assignments);

                alert(`Synced ${courses.length} courses from SocSciLearn!`);
                navigate(currentPage);
                pushToCloud();
            } catch (err) {
                alert('Sync failed: ' + err.message + '. Check your token and ensure the local server is running.');
                console.error('SocSciLearn sync error:', err);
            }
        }

        // ─── CLOUD SYNC (GitHub Gist) ────────────────────────────
        async function pushToCloud() {
            if (!IS_LOCAL || !settings.githubGistId || !settings.githubPat) return;
            const payload = { modules, assessments, assignments, timetable, notes, exportedAt: new Date().toISOString() };
            try {
                const r = await fetch('/api/cloud-push', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const j = await r.json();
                if (j.ok) console.log('Cloud sync pushed to Gist');
            } catch (e) { console.warn('Cloud push failed:', e); }
        }

        async function fetchFromCloud() {
            if (IS_LOCAL || !settings.githubGistId) return;
            try {
                const r = await fetch(`https://api.github.com/gists/${settings.githubGistId}`, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' },
                });
                if (!r.ok) return;
                const gist = await r.json();
                const content = gist.files?.['jcdxlaw-data.json']?.content;
                if (!content) return;
                const data = JSON.parse(content);
                if (data.modules?.length) { modules = data.modules; saveData('jcd_modules', modules); }
                if (data.assessments?.length) { assessments = data.assessments; saveData('jcd_assessments', assessments); }
                if (data.assignments?.length) { assignments = data.assignments; saveData('jcd_assignments', assignments); }
                if (data.timetable?.length) { timetable = data.timetable; saveData('jcd_timetable', timetable); }
                if (data.notes?.length) { notes = data.notes; saveData('jcd_notes', notes); }
                renderPage();
                console.log('Loaded data from Gist');
            } catch (e) { console.warn('Cloud fetch failed:', e); }
        }

        // ─── CALENDAR SYNC (local server only) ──────────────────
        async function syncCalendar(silent = false) {
            if (!IS_LOCAL) return;
            try {
                const r = await fetch('/api/calendar');
                if (!r.ok) return;
                const data = await r.json();
                // Update today's schedule display
                console.log(`Calendar: ${data.total} events found`);
            } catch (e) {
                if (!silent) console.warn('Calendar sync skipped:', e.message);
            }
        }

        function attachEventListeners() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    const page = this.dataset.page;
                    if (page) navigate(page);
                });
            });

            document.querySelectorAll('[data-action]').forEach(el => {
                el.addEventListener('click', function() {
                    const action = this.dataset.action;
                    switch (action) {
                        case 'add-assessment':
                            showModal('Add Assessment', getAddAssessmentForm(), [
                                { label: 'Cancel', action: 'close-modal' },
                                { label: 'Save', action: 'save-assessment', primary: true },
                            ]);
                            break;
                        case 'add-assignment':
                            showModal('Add Assignment', getAddAssignmentForm(), [
                                { label: 'Cancel', action: 'close-modal' },
                                { label: 'Save', action: 'save-assignment', primary: true },
                            ]);
                            break;
                        case 'add-module':
                            showModal('Add Module', getAddModuleForm(), [
                                { label: 'Cancel', action: 'close-modal' },
                                { label: 'Save', action: 'save-module', primary: true },
                            ]);
                            break;
                        case 'add-note':
                            showModal('Add Note', getAddNoteForm(), [
                                { label: 'Cancel', action: 'close-modal' },
                                { label: 'Save', action: 'save-note', primary: true },
                            ]);
                            break;
                        case 'sync':
                            showModal('SocSciLearn Sync', getSettingsForm(), [
                                { label: 'Close', action: 'close-modal' },
                                { label: 'Save Settings', action: 'save-settings', primary: true },
                                { label: 'Sync Now', action: 'sync-now', primary: true },
                            ]);
                            break;
                        case 'save-assessment':
                            saveAssessment();
                            break;
                        case 'save-assignment':
                            saveAssignment();
                            break;
                        case 'save-module':
                            saveModule();
                            break;
                        case 'save-note':
                            saveNote();
                            break;
                        case 'save-settings':
                            saveSettings();
                            break;
                        case 'sync-now':
                            saveSettings();
                            syncSocSciLearn();
                            break;
                        case 'close-modal':
                            closeModal();
                            break;
                        case 'export':
                            exportData();
                            break;
                        case 'import':
                            importData();
                            break;
                        case 'theme':
                            document.body.classList.toggle('light-mode');
                            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
                            break;
                        case 'view-module': {
                            const modId = el.dataset.moduleId;
                            const mod = modules.find(m => m.id === modId);
                            if (!mod) break;
                            const modAssignments = assignments.filter(a => a.module === mod.name);
                            const modAssessments = assessments.filter(a => a.module === mod.name);
                            const modNotes = notes.filter(n => n.module === mod.name);
                            const modClasses = timetable.filter(c => c.module === mod.name);
                            openModal(`
                                <button class="modal-close" data-action="close-modal">✕</button>
                                <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
                                    <div style="width:52px;height:52px;border-radius:14px;background:${mod.color};display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;">📚</div>
                                    <div>
                                        <div style="font-size:22px;font-weight:700;">${mod.name}</div>
                                        <div style="color:var(--text-secondary);font-size:14px;">${mod.code} · ${mod.type}</div>
                                    </div>
                                </div>
                                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;">
                                    <div style="background:var(--surface);border-radius:12px;padding:14px;border:1px solid var(--border);text-align:center;">
                                        <div style="font-size:24px;font-weight:700;">${modAssignments.length}</div>
                                        <div style="font-size:12px;color:var(--text-secondary);">Assignments</div>
                                    </div>
                                    <div style="background:var(--surface);border-radius:12px;padding:14px;border:1px solid var(--border);text-align:center;">
                                        <div style="font-size:24px;font-weight:700;">${modAssessments.length}</div>
                                        <div style="font-size:12px;color:var(--text-secondary);">Assessments</div>
                                    </div>
                                    <div style="background:var(--surface);border-radius:12px;padding:14px;border:1px solid var(--border);text-align:center;">
                                        <div style="font-size:24px;font-weight:700;">${modNotes.length}</div>
                                        <div style="font-size:12px;color:var(--text-secondary);">Notes</div>
                                    </div>
                                </div>
                                ${modClasses.length > 0 ? `
                                <div style="margin-bottom:20px;">
                                    <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:10px;">Classes</div>
                                    ${modClasses.map(c => `
                                        <div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;font-size:13px;">
                                            <span style="font-weight:600;">${c.day} ${c.time}</span>
                                            <span style="color:var(--text-secondary);">${c.type}${c.venue ? ' · ' + c.venue : ''}</span>
                                        </div>
                                    `).join('')}
                                </div>` : ''}
                                ${modAssessments.length > 0 ? `
                                <div style="margin-bottom:20px;">
                                    <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:10px;">Assessments</div>
                                    ${modAssessments.map(a => `
                                        <div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;font-size:13px;">
                                            <span style="font-weight:600;">${a.name}</span>
                                            <span style="color:var(--text-secondary);">${formatDate(a.date)}${a.weight ? ' · ' + a.weight + '%' : ''}</span>
                                        </div>
                                    `).join('')}
                                </div>` : ''}
                                ${modAssignments.length > 0 ? `
                                <div style="margin-bottom:20px;">
                                    <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:10px;">Assignments</div>
                                    ${modAssignments.map(a => `
                                        <div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;font-size:13px;">
                                            <span style="font-weight:600;">${a.title}</span>
                                            <span><span class="status-badge ${(a.status||'pending').toLowerCase()}">${a.status||'Pending'}</span></span>
                                        </div>
                                    `).join('')}
                                </div>` : ''}
                                ${mod.socsciId ? `<div style="margin-top:8px;"><a href="${settings.socsciUrl}/course/view.php?id=${mod.socsciId}" target="_blank" class="btn btn-secondary btn-small">Open in SocSciLearn ↗</a></div>` : ''}
                            `);
                            break;
                        }
                    }
                });
            });

            document.querySelectorAll('.filter-pill').forEach(pill => {
                pill.addEventListener('click', function() {
                    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    renderPage();
                });
            });

            document.querySelectorAll('.color-option').forEach(opt => {
                opt.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });

            document.querySelector('[data-module-filter]')?.addEventListener('change', function() {
                renderPage();
            });

            document.querySelectorAll('.reference-tab-button').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    document.querySelectorAll('.reference-tab-button').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.reference-tab-content').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
                });
            });
        }

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }

        renderPage();

        // On GitHub Pages: fetch latest data from Gist
        if (!IS_LOCAL) fetchFromCloud();
        // Sync calendar on load (local only, silent)
        if (IS_LOCAL) syncCalendar(true);
        // Re-sync calendar every 5 minutes
        if (IS_LOCAL) setInterval(() => syncCalendar(true), 5 * 60 * 1000);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration failed:', e));
        }
    </script>
